<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SISTEMA RECON | ANIVERSARI 14</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --bg-color: #030712;
            --panel-bg: #0b1329;
            --neon-blue: #38bdf8;
            --dark-blue: #1d4ed8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --cyber-green: #10b981;
            --cyber-red: #ef4444;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(56, 189, 248, 0.02) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(56, 189, 248, 0.02) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
        }

        .container {
            background: var(--panel-bg);
            border: 2px solid var(--dark-blue);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 25px rgba(29, 78, 216, 0.25);
            border-radius: 20px;
            padding: 26px 20px;
            max-width: 420px;
            width: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.3s ease;
        }

        .container::before {
            content: "SYSTEM ONLINE | RECON V4.0";
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--bg-color);
            padding: 0 10px;
            font-size: 0.6rem;
            color: var(--neon-blue);
            font-family: monospace;
            letter-spacing: 1.5px;
            border: 1px solid var(--dark-blue);
            border-radius: 4px;
        }

        /* BARRA DE PROGRESO */
        .progress-bar {
            display: flex;
            justify-content: space-between;
            gap: 5px;
            margin-bottom: 22px;
        }

        .progress-step {
            height: 9px;
            flex-grow: 1;
            background-color: rgba(56, 189, 248, 0.08);
            border: 1px solid rgba(29, 78, 216, 0.2);
            border-radius: 3px;
            transition: all 0.4s ease;
        }

        .progress-step.active {
            background-color: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
            border-color: var(--neon-blue);
        }

        h1 {
            color: var(--neon-blue);
            font-size: clamp(1.4rem, 6vw, 1.7rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0 0 18px 0;
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.3);
            text-align: center;
        }

        .pista-box {
            background-color: rgba(3, 7, 18, 0.5);
            border: 1px solid rgba(56, 189, 248, 0.12);
            border-left: 5px solid var(--neon-blue);
            padding: 24px 18px;
            text-align: left;
            border-radius: 12px;
            font-size: clamp(1.1rem, 4.5vw, 1.25rem);
            line-height: 1.6;
            margin-bottom: 22px;
            position: relative;
            min-height: 120px;
        }

        /* 🔴 NUEVO OVERLAY DE IMPACTO DE PANTALLA COMPLETA PARA EL CAMBIO DE TARJETA */
        .cyber-alert-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #020617;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            border: 3px solid var(--cyber-green);
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.4);
            display: none; /* Se activa por JavaScript */
            text-align: center;
            padding: 20px;
        }

        .alert-title {
            color: var(--cyber-green);
            font-family: monospace;
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 15px;
            animation: pulse-border 0.3s infinite alternate;
        }

        .alert-subtitle {
            color: var(--text-main);
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        @keyframes pulse-border {
            0% { text-shadow: 0 0 5px var(--cyber-green); transform: scale(1); }
            100% { text-shadow: 0 0 15px var(--cyber-green), 2px 0 0 var(--cyber-red); transform: scale(1.02); }
        }

        /* CONTENEDOR DE LA CÁMARA VISOR */
        .scanner-section {
            background-color: #030712;
            border: 2px solid rgba(56, 189, 248, 0.2);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.9);
            border-radius: 14px;
            padding: 6px;
            margin-bottom: 22px;
            position: relative;
            overflow: hidden;
            display: none; /* Oculto por defecto, solo se abre al pulsar el botón */
        }

        #reader {
            width: 100% !important;
            border: none !important;
            background: transparent !important;
        }

        #reader canvas { display: none !important; }
        #reader img, #reader header, #reader footer { display: none !important; }
        #reader__dashboard_section { display: none !important; }

        #reader video {
            border-radius: 10px !important;
            object-fit: cover !important;
            max-height: 200px;
            width: 100% !important;
            display: block;
        }

        /* BOTÓN DE CONTROL DE CÁMARA PRINCIPAL */
        .btn-camera-hud {
            background: linear-gradient(135deg, var(--dark-blue), #1e40af);
            color: white;
            border: 1px solid var(--neon-blue);
            padding: 16px 20px;
            font-size: 0.95rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            box-shadow: 0 4px 12px rgba(29, 78, 216, 0.4);
            transition: all 0.2s;
            margin-bottom: 22px;
        }

        .btn-camera-hud:active {
            transform: scale(0.98);
            background: var(--neon-blue);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        /* SECCIÓN INFERIOR: ENTRADA MANUAL */
        .manual-input {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 100%;
            border-top: 1px dashed rgba(56, 189, 248, 0.15);
            padding-top: 18px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        input {
            background: #030712;
            border: 1px solid var(--dark-blue);
            color: var(--neon-blue);
            padding: 15px;
            border-radius: 10px;
            width: 95px;
            text-align: center;
            font-weight: bold;
            font-family: monospace;
            outline: none;
            transition: all 0.3s;
            font-size: 18px;
        }

        input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.25);
        }

        .btn-manual {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: var(--text-muted);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 15px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9rem;
            transition: all 0.3s;
            flex-grow: 1;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 4px;
            font-family: monospace;
            display: none;
        }

        .footer-tech {
            font-size: 0.6rem;
            color: rgba(148, 163, 184, 0.2);
            margin-top: 20px;
            text-transform: uppercase;
            font-family: monospace;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container" id="main-panel">
    <div class="cyber-alert-screen" id="hacker-alert">
        <div class="alert-title">⚠️ ENLLAÇ DETECTAT ⚠️</div>
        <div class="alert-subtitle">SISTEMA RECON CONFIGURAT<br>DESBLOQUEJANT NOVA MISSIÓ...</div>
    </div>

    <div class="progress-bar">
        <div class="progress-step" id="step-1"></div>
        <div class="progress-step" id="step-2"></div>
        <div class="progress-step" id="step-3"></div>
        <div class="progress-step" id="step-4"></div>
        <div class="progress-step" id="step-5"></div>
        <div class="progress-step" id="step-6"></div>
        <div class="progress-step" id="step-7"></div>
        <div class="progress-step" id="step-8"></div>
    </div>

    <h1 id="pista-titol">SISTEMA INICIALITZAT</h1>
    
    <div class="pista-box" id="pista-text">
        <span id="actual-text">Benvingut a la teua missió de 14 aniversari. Inicia el lector inferior per escanejar els QR o utilitza el codi manual.</span>
    </div>

    <button id="custom-camera-btn" class="btn-camera-hud" onclick="controlarLectorCuerpo()">Activar Lector QR</button>

    <div class="scanner-section" id="camera-box-area">
        <div id="reader"></div>
    </div>

    <div class="manual-input">
        <div class="input-group">
            <input type="text" id="pista-num" placeholder="PIN" maxlength="4" inputmode="numeric" pattern="[0-9]*">
            <button class="btn-manual" onclick="carregarPistaManual()">Validar</button>
        </div>
        <div class="error-msg" id="error-text">❌ CODI PIN INCORRECTE</div>
    </div>
    
    <div class="footer-tech">ANTENNA: READY | HUD INTEGRATED</div>
</div>

<script>
    let audioCtx = null;
    let html5QrCode = null;

    function playSound(type) {
        try {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (type === 'success') {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine'; gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
                setTimeout(() => {
                    let osc2 = audioCtx.createOscillator(); let gain2 = audioCtx.createGain();
                    osc2.connect(gain2); gain2.connect(audioCtx.destination);
                    osc2.type = 'sine'; gain2.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    osc2.frequency.setValueAtTime(783.99, audioCtx.currentTime); // G5
                    osc2.start(); osc2.stop(audioCtx.currentTime + 0.15);
                }, 80);
            } else if (type === 'error') {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sawtooth'; gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                osc.frequency.setValueAtTime(110, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.25);
            }
        } catch(e) { console.log("Audio ctx error"); }
    }

    const pins = {
        "3540": 1, "4821": 2, "7395": 3, "1064": 4, 
        "8513": 5, "2947": 6, "6152": 7, "9308": 8
    };

    const gincana = {
        1: { titol: "MISSIÓ 01: START", text: "La segona targeta s'amaga dins de casa. Està apegada al costat del guardià del fred, l'únic que treballa dia i nit sense descansar. Què és?" },
        2: { titol: "MISSIÓ 02: LAB", text: "Molt bé. Anem a pel Regal 1. Sal al jardí. El teu objectiu i la següent targeta estan dalt d'una herència de dinosaures, amagat en l'arbre que té un cor de fusta gegant en la seua fruita. No mires al terra." },
        3: { titol: "MISSIÓ 03: AVANPOST", text: "Primer regal aconseguit. Anem a per la Targeta 4. El paper que busques està molt prop d'on estàs. Gira't i busca dins del refugi fet de fusta que vigila el corral." },
        4: { titol: "MISSIÓ 04: REFRIGERACIÓ", text: "Ja la tens. Ara busca el Regal 2. Canviem de lloc. El regal t'espera en el peatge obligatori d'aigua abans d'entrar a nadar, pero està darrere de la seua esquena, on ningú es mira mentre es banya." },
        5: { titol: "MISSIÓ 05: PORTAL", text: "Segon regal en la butxaca. Anem a per la Targeta 6. Busca una barrera de metall que quasi mai s'usa. Té unes plantes al costat i, si et poses davant d'ella, estaràs mirant directament als ulls d'una finestra de la casa." },
        6: { titol: "MISSIÓ 06: BOTÀNICA", text: "Ja la tens. Anem a pel Regal 3. Torna a mirar cap a terra. Busca entre les brosses del peu de la reixa on creix eixa planta com una enfiladissa amb punxes, la que et taca els dits de tinta fosca quan agafes el seu fruit a l'estiu." },
        7: { titol: "MISSIÓ 07: LOGÍSTICA", text: "Regal 3 aconseguit. Queda poc. Dirigix-te al lloc on es fa la màgia dels diumenges amb foc, llenya i arròs. Entra al seu quartet i alça el que s'usa per a apagar la set." },
        8: { titol: "MISSIÓ 08: ENDGAME", text: "Has arribat al final. El premi gran t'espera. El quart regal està en l'habitació on es guarden els remeis per a les coses trencades. Entra-hi, però esta vegada no busques en terra: el tresor mira a les teues sabates des del cel d'eixe quartet." }
    };

    function actualitzarBarra(id) {
        for (let i = 1; i <= 8; i++) {
            const step = document.getElementById('step-' + i);
            if (i <= id) { step.classList.add('active'); } else { step.classList.remove('active'); }
        }
    }

    // 🚨 APAGADO Y CIERRE TOTAL DE LA CÁMARA
    function forzarCierreCamara() {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                document.getElementById('camera-box-area').style.display = 'none'; // Esconde el recuadro negro
                const mainBtn = document.getElementById('custom-camera-btn');
                mainBtn.style.display = 'block'; // Vuelve a mostrar el botón
                mainBtn.innerText = "Obrir escàner de propera missió"; // Cambia el texto
            }).catch(err => console.log("Error al cerrar cámara:", err));
        } else {
            document.getElementById('camera-box-area').style.display = 'none';
        }
    }

    function mostrarPista(id) {
        const pista = gincana[id];
        if (pista) {
            // 1. Apagamos la cámara de inmediato para que no se quede congelada
            forzarCierreCamara();

            // 2. Lanzamos el pantallazo HACKER de alerta en la pantalla
            const alertScreen = document.getElementById('hacker-alert');
            alertScreen.style.display = 'flex';
            playSound('success'); // Suena el efecto en el QR

            // 3. Bloqueamos la pantalla 1.2 segundos para asimilar el cambio y luego mostramos la pista
            setTimeout(() => {
                alertScreen.style.display = 'none'; // Quitamos la alerta
                document.getElementById('pista-titol').innerText = pista.titol;
                document.getElementById('actual-text').innerText = pista.text;
                document.getElementById('error-text').style.display = 'none';
                actualitzarBarra(id);

                // Efecto centelleo final en el panel general
                const panel = document.getElementById('main-panel');
                panel.style.boxShadow = "0 0 40px var(--cyber-green)";
                setTimeout(() => {
                    panel.style.boxShadow = "0 10px 30px rgba(0, 0, 0, 0.5), 0 0 25px rgba(29, 78, 216, 0.25)";
                }, 400);
            }, 1200);
        }
    }

    function comprovarHash() {
        const hash = window.location.hash;
        if (hash.includes('pista')) {
            const num = hash.replace('#pista', '');
            mostrarPista(parseInt(num));
        }
    }

    function carregarPistaManual() {
        const pinIntroducido = document.getElementById('pista-num').value.trim();
        const numPista = pins[pinIntroducido];

        if (numPista) {
            window.location.hash = 'pista' + numPista;
            mostrarPista(numPista);
            document.getElementById('pista-num').value = '';
        } else {
            document.getElementById('error-text').style.display = 'block';
            playSound('error');
        }
    }

    function onScanSuccess(decodedText, decodedResult) {
        if (decodedText.includes('#pista')) {
            const partes = decodedText.split('#pista');
            const numPista = parseInt(partes[partes.length - 1]);
            
            if (gincana[numPista]) {
                window.location.hash = 'pista' + numPista;
                mostrarPista(numPista);
            }
        }
    }

    // CONTROL INTELIGENTE DE APERTURA POR EL USUARIO
    function controlarLectorCuerpo() {
        if (!html5QrCode) {
            html5QrCode = new Html5Qrcode("reader");
        }
        
        // Mostramos la caja negra de la cámara justo antes de encenderla
        document.getElementById('camera-box-area').style.display = 'block';
        
        const config = { fps: 20, qrbox: { width: 220, height: 220 } };

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .then(() => {
            // Ocultamos el botón para que apunte a pantalla completa limpiamente
            document.getElementById('custom-camera-btn').style.display = 'none';
        })
        .catch((err) => {
            alert("⚠️ Permís denegat. Recorda usar HTTPS en el mòbil per a activar la càmera.");
            document.getElementById('camera-box-area').style.display = 'none';
        });
    }

    window.addEventListener('hashchange', comprovarHash);
    window.onload = comprovarHash;
</script>

</body>
</html>
